<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code ROI Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#6c5ce7;--accent2:#00cec9;--green:#00b894;--red:#d63031;--yellow:#fdcb6e;--text:#e0e0e0;--muted:#8a8a9a;--white:#fff}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:24px}
header{text-align:center;padding:40px 0 20px;border-bottom:1px solid var(--border);margin-bottom:20px}
header h1{font-size:2.2rem;font-weight:700;color:var(--white);letter-spacing:-0.5px}
header .period{color:var(--muted);font-size:1rem;margin-top:8px}
header .generated{color:var(--muted);font-size:0.8rem;margin-top:4px;opacity:0.6}
.controls{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:24px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.controls .quick-picks{display:flex;gap:6px;flex-wrap:wrap}
.controls .pick{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.controls .pick:hover{border-color:var(--accent);color:var(--white)}
.controls .pick.active{background:var(--accent);border-color:var(--accent);color:var(--white)}
.controls .sep{width:1px;height:28px;background:var(--border);margin:0 8px}
.controls input[type=date]{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85rem;font-family:inherit}
.controls .date-label{font-size:0.8rem;color:var(--muted)}
.refresh-btn{background:linear-gradient(135deg,var(--accent),#a29bfe);color:var(--white);border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:6px;transition:all 0.3s;margin-left:8px}
.refresh-btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px #6c5ce744}
.refresh-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.refresh-btn .spinner{display:none;width:14px;height:14px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
.refresh-btn.loading .spinner{display:inline-block}
.refresh-btn.loading .icon{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.hero{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
.hero-card{background:linear-gradient(135deg,var(--card),#1a1a2e);border:1px solid var(--border);border-radius:16px;padding:28px;text-align:center;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.hero-card.senior::before{background:linear-gradient(90deg,var(--red),#e17055)}
.hero-card.api::before{background:linear-gradient(90deg,var(--yellow),#e67e22)}
.hero-card.actual::before{background:linear-gradient(90deg,var(--green),var(--accent2))}
.hero-card .label{font-size:0.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.hero-card .amount{font-size:2.8rem;font-weight:800;margin-bottom:4px}
.hero-card.senior .amount{color:var(--red)}
.hero-card.api .amount{color:var(--yellow)}
.hero-card.actual .amount{color:var(--green)}
.hero-card .rate{font-size:1rem;color:var(--muted)}
.savings-banner{background:linear-gradient(135deg,#00b89422,#00cec922);border:1px solid #00b89444;border-radius:16px;padding:24px;text-align:center;margin-bottom:32px}
.savings-banner .big{font-size:2rem;font-weight:800;color:var(--green)}
.savings-banner .sub{color:var(--muted);margin-top:4px;font-size:0.95rem}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px}
.chart-card h2{font-size:1.1rem;font-weight:600;color:var(--white);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.chart-toggles{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.chart-toggles label{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:0.8rem;color:var(--muted);transition:all 0.2s;user-select:none}
.chart-toggles label:hover{border-color:var(--accent);color:var(--white)}
.chart-toggles input{display:none}
.chart-toggles input:checked+span{color:var(--white)}
.chart-toggles label:has(input:checked){background:var(--accent);border-color:var(--accent)}
.chart-toggles .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.chart-area{position:relative;height:220px;display:flex;align-items:flex-end;gap:2px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.chart-bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;min-width:0;position:relative}
.chart-bars{display:flex;gap:1px;align-items:flex-end;width:100%;justify-content:center;height:190px}
.chart-bar{border-radius:3px 3px 0 0;min-width:3px;transition:height 0.4s ease;position:relative;cursor:pointer;flex:1;max-width:14px}
.chart-bar:hover{opacity:0.8}
.chart-bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:0.7rem;white-space:nowrap;z-index:10;color:var(--white)}
.chart-bar:hover .tip{display:block}
.chart-date{font-size:0.65rem;color:var(--muted);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;position:absolute;bottom:-24px}
.chart-legend{display:flex;gap:16px;margin-top:8px;padding-top:12px;justify-content:center;flex-wrap:wrap}
.chart-legend span{display:flex;align-items:center;gap:4px;font-size:0.75rem;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.card h2{font-size:1.1rem;font-weight:600;color:var(--white);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card h2 .icon{font-size:1.2rem}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ffffff08}
.stat-row:last-child{border-bottom:none}
.stat-row .label{color:var(--muted);font-size:0.9rem}
.stat-row .value{font-weight:600;color:var(--white);font-size:0.9rem}
.green{color:var(--green)!important}.red{color:var(--red)!important}.yellow{color:var(--yellow)!important}.accent{color:var(--accent)!important}
.highlight-box{background:#6c5ce711;border:1px solid #6c5ce733;border-radius:8px;padding:12px 16px;margin-top:12px;text-align:center}
.highlight-box .big{font-size:1.8rem;font-weight:800;color:var(--accent)}
.highlight-box .label{font-size:0.8rem;color:var(--muted);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
table th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.5px}
table td{padding:10px 12px;border-bottom:1px solid #ffffff06}
table td.r,table th.r{text-align:right}
table tr:hover{background:#ffffff04}
.bar-row{margin-bottom:10px}
.bar-row .bar-header{display:flex;justify-content:space-between;margin-bottom:3px}
.bar-row .bar-label{font-size:0.85rem;color:var(--text)}
.bar-row .bar-val{font-size:0.8rem;color:var(--muted)}
.bar-track{height:20px;background:#ffffff08;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.bar-fill.purple{background:linear-gradient(90deg,var(--accent),#a29bfe)}
.bar-fill.teal{background:linear-gradient(90deg,var(--accent2),#55efc4)}
.bar-fill.bgreen{background:linear-gradient(90deg,var(--green),#55efc4)}
.footer{text-align:center;padding:32px 0;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:32px}
.full-width{grid-column:1/-1}
@media(max-width:900px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.controls{flex-direction:column}.controls .sep{display:none}}
</style>
</head>
<body>
<div class="container" id="app">Loading...</div>
<script>
const $ = s => document.querySelector(s);
const N = n => n.toLocaleString();
const M = n => n >= 1000 ? '$' + N(Math.round(n)) : '$' + n.toFixed(2);
const T = n => n >= 1e9 ? (n/1e9).toFixed(1)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n.toString();
const H = h => h < 1 ? Math.round(h*60)+' min' : h < 24 ? h.toFixed(1)+'h' : (h/24).toFixed(1)+' days ('+Math.round(h)+'h)';
const D = s => { const d = new Date(s+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const Dshort = s => { const d = new Date(s+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };

function statRow(l, v, c) { return `<div class="stat-row"><span class="label">${l}</span><span class="value ${c||''}">${v}</span></div>`; }
function barChart(data, color) {
  const max = Math.max(...Object.values(data)), total = Object.values(data).reduce((a,b)=>a+b,0);
  return Object.entries(data).map(([k,v]) => {
    const w = Math.max(2, v/max*100);
    return `<div class="bar-row"><div class="bar-header"><span class="bar-label">${k}</span><span class="bar-val">${N(v)} (${(v/total*100).toFixed(1)}%)</span></div><div class="bar-track"><div class="bar-fill ${color}" style="width:${w}%"></div></div></div>`;
  }).join('');
}

function today() { return new Date().toISOString().slice(0,10); }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function monthStart() { const d = new Date(); return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-01'; }
function yearStart() { return new Date().getFullYear()+'-01-01'; }

let activePick = 'all';
let currentData = null;

const CHART_SERIES = {
  messages:  { label: 'Messages',   color: '#6c5ce7', key: 'messageCount' },
  sessions:  { label: 'Sessions',   color: '#00cec9', key: 'sessionCount' },
  toolCalls: { label: 'Tool Calls', color: '#00b894', key: 'toolCallCount' },
  tokens:    { label: 'Tokens',     color: '#fdcb6e', key: null },
};

function getCheckedSeries() {
  return Object.keys(CHART_SERIES).filter(k => {
    const el = document.getElementById('chk_'+k);
    return el && el.checked;
  });
}

function renderChart() {
  if (!currentData) return;
  const daily = currentData.daily_activity || [];
  const dailyTokens = currentData.daily_model_tokens || [];
  const checked = getCheckedSeries();
  if (!daily.length || !checked.length) {
    const el = document.getElementById('chartArea');
    if (el) el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:60px 0">No daily data available for this period</div>';
    return;
  }

  // Build token lookup by date
  const tokenByDate = {};
  dailyTokens.forEach(d => {
    tokenByDate[d.date] = Object.values(d.tokensByModel || {}).reduce((a,b)=>a+b,0);
  });

  // Find max value across all checked series
  let maxVal = 0;
  daily.forEach(d => {
    checked.forEach(k => {
      const v = k === 'tokens' ? (tokenByDate[d.date] || 0) : (d[CHART_SERIES[k].key] || 0);
      if (v > maxVal) maxVal = v;
    });
  });

  const chartH = 190;
  const barsHtml = daily.map(d => {
    const bars = checked.map(k => {
      const s = CHART_SERIES[k];
      const v = k === 'tokens' ? (tokenByDate[d.date] || 0) : (d[s.key] || 0);
      const h = maxVal > 0 ? Math.max(2, (v / maxVal) * chartH) : 2;
      return `<div class="chart-bar" style="height:${h}px;background:${s.color}"><span class="tip">${s.label}: ${N(v)}<br>${d.date}</span></div>`;
    }).join('');
    return `<div class="chart-bar-group"><div class="chart-bars">${bars}</div><span class="chart-date">${Dshort(d.date)}</span></div>`;
  }).join('');

  const legendHtml = checked.map(k => {
    const s = CHART_SERIES[k];
    return `<span><span class="dot" style="background:${s.color}"></span>${s.label}</span>`;
  }).join('');

  const el = document.getElementById('chartArea');
  if (el) el.innerHTML = `<div class="chart-area">${barsHtml}</div><div class="chart-legend">${legendHtml}</div>`;
}

async function fetchData(params) {
  const btn = $('#refreshBtn');
  if (btn) { btn.classList.add('loading'); btn.disabled = true; }
  try {
    const res = await fetch('/api/refresh', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(params || {}) });
    if (res.ok) { const data = await res.json(); currentData = data; render(data); }
  } catch(e) { console.error(e); }
  if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
}

function pickRange(name) {
  activePick = name;
  let params = {};
  switch(name) {
    case 'today': params = {since: today(), until: today()}; break;
    case 'yesterday': params = {since: daysAgo(1), until: daysAgo(1)}; break;
    case '7d': params = {days: 7}; break;
    case '30d': params = {days: 30}; break;
    case 'month': params = {since: monthStart(), until: today()}; break;
    case 'ytd': params = {since: yearStart(), until: today()}; break;
    case 'all': params = {}; break;
    case 'custom':
      const s = $('#dateFrom').value; const u = $('#dateTo').value;
      if (!s) return;
      params = {since: s}; if (u) params.until = u; break;
  }
  fetchData(params);
}
function render(d) {
  currentData = d;
  const c = d.cost_comparison, co = d.code_output, tc = d.time_comparison, tu = d.token_usage;
  const ce = d.cache_efficiency, ss = d.session_stats, ag = d.agent_activity;
  const fe = d.file_edits_non_git, pp = d.productivity_patterns, as = d.assumptions;

  const seniorHrs = H(tc.senior_dev_hours), claudeHrs = H(tc.claude_active_hours);
  const locPerHr = co.total_loc_touched > 0 ? N(Math.round(co.total_loc_touched / Math.max(tc.claude_active_hours, 0.1))) : '0';
  const repos = Object.entries(d.repos).sort((a,b) => b[1].insertions - a[1].insertions);
  const models = Object.entries(tu.per_model).sort((a,b) => b[1].total_cost - a[1].total_cost);
  const modelRows = models.map(([n,m]) => `<tr><td>${n}</td><td class="r">${T(m.output_tokens)}</td><td class="r"><strong>${M(m.total_cost)}</strong></td></tr>`).join('');
  const toolCats = d.tool_usage ? {'System Operations':d.tool_usage.categories['System Ops']||0,'Code Reading & Research':d.tool_usage.categories['Code Reading']||0,'Code Writing':d.tool_usage.categories['Code Writing']||0,'Planning & Tasks':d.tool_usage.categories['Planning']||0,'Agent Orchestration':d.tool_usage.categories['Agents']||0,'Web Research':d.tool_usage.categories['Web Research']||0} : null;
  const topTools = d.tool_usage ? Object.fromEntries(Object.entries(d.tool_usage.tool_counts).sort((a,b)=>b[1]-a[1]).slice(0,10)) : null;
  const bashCats = d.tool_usage ? Object.fromEntries(Object.entries(d.tool_usage.bash_subcategories).sort((a,b)=>b[1]-a[1])) : null;
  const repoRows = repos.map(([n,r]) => `<tr><td>${n}</td><td class="r">${r.commits}</td><td class="r green">+${N(r.insertions)}</td><td class="r red">-${N(r.deletions)}</td><td class="r">${N(r.net)}</td><td class="r">${N(r.files_changed)}</td><td>${r.first_commit}${r.first_commit!==r.last_commit?' - '+r.last_commit:''}</td></tr>`).join('');

  const periodText = co.first_date && co.last_date ? `${D(co.first_date)} &mdash; ${D(co.last_date)} (${d.calendar_days} days)` : d.period;
  const picks = [['today','Today'],['yesterday','Yesterday'],['7d','7 Days'],['30d','30 Days'],['month','This Month'],['ytd','Year to Date'],['all','All Time']];
  const pickBtns = picks.map(([k,l]) => `<button class="pick ${activePick===k?'active':''}" onclick="pickRange('${k}')">${l}</button>`).join('');

  // Chart toggles - preserve checked state
  const prevChecked = getCheckedSeries();
  const defaultChecked = prevChecked.length > 0 ? prevChecked : ['messages', 'toolCalls'];
  const chartToggles = Object.entries(CHART_SERIES).map(([k,s]) => {
    const chk = defaultChecked.includes(k) ? 'checked' : '';
    return `<label><input type="checkbox" id="chk_${k}" ${chk} onchange="renderChart()"><span class="dot" style="background:${s.color}"></span><span>${s.label}</span></label>`;
  }).join('');

  $('#app').innerHTML = `
<header>
  <h1>Claude Code ROI Dashboard</h1>
  <div class="period">${periodText}</div>
  <div class="generated">Generated ${d.generated}</div>
</header>

<div class="controls">
  <div class="quick-picks">${pickBtns}</div>
  <div class="sep"></div>
  <span class="date-label">From</span>
  <input type="date" id="dateFrom" value="${d.since||''}" onchange="activePick='custom'">
  <span class="date-label">To</span>
  <input type="date" id="dateTo" value="${d.until||today()}" onchange="activePick='custom'">
  <button class="refresh-btn" id="refreshBtn" onclick="pickRange(activePick)">
    <span class="spinner"></span><span class="icon">&#8635;</span> Refresh
  </button>
</div>

<div class="hero">
  <div class="hero-card senior"><div class="label">Hire a Senior Developer</div><div class="amount">${M(c.senior_dev_usd)}</div><div class="rate">$${as.senior_rate_usd_hr}/hr &times; ${N(Math.round(tc.senior_dev_hours))} hours</div></div>
  <div class="hero-card api"><div class="label">Claude API (Pay-Per-Token)</div><div class="amount">${M(c.api_equivalent_usd)}</div><div class="rate">${T(tu.total_tokens)} tokens at published rates</div></div>
  <div class="hero-card actual"><div class="label">Claude Max Subscription (Actual)</div><div class="amount">${M(c.subscription_usd)}</div><div class="rate">$${as.subscription_monthly_usd}/mo = ${M(c.claude_effective_hourly_rate)}/hr effective</div></div>
</div>

<div class="savings-banner">
  <div class="big">${M(c.savings_vs_senior)} saved vs senior developer &nbsp;|&nbsp; ${M(c.savings_vs_api)} saved vs API</div>
  <div class="sub">Effective rate: ${M(c.claude_effective_hourly_rate)}/hr vs $${as.senior_rate_usd_hr}/hr &mdash; ${Math.round(c.hourly_cost_multiplier)}x cheaper. ROI: ${N(Math.round(c.roi_multiplier))}x return on investment.</div>
</div>

<div class="chart-card">
  <h2>&#128200; Daily Activity</h2>
  <div class="chart-toggles">${chartToggles}</div>
  <div id="chartArea"></div>
</div>

<div class="grid">
  <div class="card"><h2><span class="icon">&#128187;</span> Work Delivered</h2>
    ${statRow('Lines of code written','+'+N(co.insertions),'green')}
    ${statRow('Lines of code removed','-'+N(co.deletions),'red')}
    ${statRow('Net new lines of code',N(co.net_lines))}
    ${statRow('Files changed',N(co.files_changed))}
    ${statRow('Commits',N(co.total_commits))}
    ${statRow('Repositories',co.repos_touched)}
    ${statRow('Non-git files edited',N(fe.unique_files))}
  </div>
  <div class="card"><h2><span class="icon">&#9201;</span> Time Comparison</h2>
    ${statRow('Claude active work time',claudeHrs,'accent')}
    ${statRow('Same work by senior dev',seniorHrs,'red')}
    ${statRow('Time saved',H(tc.time_saved_hours)+' ('+tc.time_saved_pct+'%)','green')}
    ${statRow('Claude lines of code/hr',locPerHr,'accent')}
    ${statRow('Senior dev lines of code/hr',as.senior_loc_per_hr)}
    <div class="highlight-box"><div class="big">${tc.speed_multiplier}x faster</div><div class="label">Speed multiplier vs senior developer</div></div>
  </div>
  <div class="card"><h2><span class="icon">&#128172;</span> Claude Activity</h2>
    ${statRow('Messages exchanged',N(ss.total_messages))}
    ${statRow('Sessions',N(ss.total_sessions))}
    ${statRow('Tool executions',N(ss.total_tool_calls))}
    ${statRow('Subagent invocations',N(ag.total_invocations))}
    ${statRow('Days active',ss.days_active)}
    ${ss.days_active>0?statRow('Avg messages/day',N(Math.round(ss.total_messages/ss.days_active))):''}
    ${ss.days_active>0?statRow('Avg tool calls/day',N(Math.round(ss.total_tool_calls/ss.days_active))):''}
  </div>
  <div class="card"><h2><span class="icon">&#127919;</span> Token Usage</h2>
    ${statRow('Total tokens processed',T(tu.total_tokens))}
    ${statRow('Output tokens (Claude wrote)',T(tu.output_tokens))}
    ${statRow('Input tokens (fresh)',T(tu.input_tokens))}
    ${statRow('Cache read tokens',T(tu.cache_read_tokens))}
    ${statRow('Cache create tokens',T(tu.cache_create_tokens))}
    <div class="highlight-box"><div class="big">${ce.hit_rate_pct.toFixed(1)}% cache hit</div><div class="label">${M(ce.savings_usd)} saved by prompt caching</div></div>
  </div>
</div>

<div class="grid">
  <div class="card"><h2><span class="icon">&#129302;</span> Cost by Model</h2>
    <table><tr><th>Model</th><th class="r">Output</th><th class="r">API Cost</th></tr>${modelRows}
    <tr style="border-top:2px solid var(--border)"><td><strong>Total</strong></td><td class="r"><strong>${T(tu.output_tokens)}</strong></td><td class="r"><strong>${M(c.api_equivalent_usd)}</strong></td></tr></table>
  </div>
  ${toolCats?`<div class="card"><h2><span class="icon">&#128736;</span> Tool Usage by Category</h2>${barChart(toolCats,'purple')}</div>`:''}
